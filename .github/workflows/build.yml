name: Build OpenWrt (Ultimate Edition)

on:
  workflow_dispatch: 

env:
  REPO_URL: https://github.com/coolsnowwolf/lede 
  REPO_BRANCH: master                            
  TZ: Asia/Shanghai                              

jobs:
  build:
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout Custom Configs
        uses: actions/checkout@v4
        with:
          path: custom_config 

      # ================== 研判三修正：生成精确时间戳 ==================
      - name: Generate Timestamp
        id: time
        run: |
          sudo timedatectl set-timezone "$TZ"
          echo "FILE_DATE=$(date +"%Y%m%d_%H%M")" >> $GITHUB_ENV
      # ==============================================================

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Init build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget ccache
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Clone OpenWrt Source
        run: |
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

      # ================== 研判一修正：绝对安全的纯净缓存 ==================
      - name: Cache Downloaded Files
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('custom_config/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-
      # ===================================================================

      # ================== 核心修正：智能清道夫顺序 ==================
      - name: Update feeds.conf
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a

      - name: Run diy.sh
        run: |
          chmod +x custom_config/diy.sh
          cd openwrt
          /bin/bash ../custom_config/diy.sh

      - name: Install feeds
        run: |
          cd openwrt
          ./scripts/feeds install -a
      # ==============================================================

      - name: Load Custom Configuration
        run: |
          cd openwrt
          [ -e ../custom_config/.config ] && mv ../custom_config/.config .config
          [ -d ../custom_config/files ] && mv ../custom_config/files files
          [ -d files ] && chmod -R 755 files || true
          
          # 【强力补丁】清除缓存，重新生成一份干净的依赖菜单
          rm -rf tmp/
          
          make defconfig

      # ================== 研判二修正：网络防爆破机制 ==================
      - name: Download package
        run: |
          cd openwrt
          echo "开始下载依赖包..."
          make download -j8 || make download -j1 V=s || echo "部分包下载失败，但在编译阶段会强制重试！"
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
      # ==============================================================

      - name: Compile the firmware
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s

      - name: Organize files
        id: organize
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_x86_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          retention-days: 7
