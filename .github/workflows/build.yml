name: Build OpenWrt (Ultimate Edition)

on:
  workflow_dispatch: # 手动触发工作流

env:
  # ================== 优化一：消除 Node.js 20 警告 ==================
  # 强制 GitHub Actions 使用 Node.js 24，彻底干掉那个烦人的全局警告日志！
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # ==================================================================
  REPO_URL: https://github.com/coolsnowwolf/lede 
  REPO_BRANCH: master                            
  TZ: Asia/Shanghai                              

jobs:
  build:
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout Custom Configs
        uses: actions/checkout@v4
        with:
          path: custom_config 

      # ================== 研判三修正：生成精确时间戳 ==================
      - name: Generate Timestamp
        id: time
        run: |
          # 校准时区，并生成当前时间戳，供最后固件打包命名使用
          sudo timedatectl set-timezone "$TZ"
          echo "FILE_DATE=$(date +"%Y%m%d_%H%M")" >> $GITHUB_ENV
      # ==============================================================

      # ================== 极限扩容一：官方插件清理 ==================
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          # 【防御机制】这里设为 false！牺牲4GB硬盘保留 Swap 虚拟内存，防止多线程编译C++时爆内存直接被 Kill！
          swap-storage: false 

      # ================== 极限扩容二：核爆级手动清理 & 环境初始化 ==================
      - name: Nuclear Clean & Init build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          echo ">>> 1. 执行核爆级空间清理，暴力删除极其占空间的预装开发环境..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/share/boost /usr/local/share/chromium /usr/lib/jvm /usr/local/lib/node_modules /usr/local/share/powershell /usr/share/rust /opt/hostedtoolcache
          
          echo ">>> 2. 卸载极臃肿且用不到的大型软件包..."
          sudo -E apt-get -qq update
          sudo -E apt-get -qq -y purge azure-cli* ghc* zulu* hhvm* llvm* firefox* google* dotnet* powershell* openjdk* mysql* php* mongodb* snapd microsoft-edge-stable || true
          
          echo ">>> 3. 清理废弃依赖并彻底清空 APT 缓存..."
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          
          echo ">>> 4. 安装 OpenWrt 编译必备依赖..."
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          
          echo ">>> 5. 看看我们榨干后还剩多少极限空间！"
          df -hT
      # =========================================================================

      - name: Clone OpenWrt Source
        run: |
          # 仅克隆最新一次提交（depth 1），极大地加快源码下载速度并节省硬盘空间
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

      # ================== 研判一修正：绝对安全的纯净缓存 ==================
      - name: Cache Downloaded Files
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          # 使用自定义 .config 文件的哈希值作为缓存 Key，一旦配置改变自动弃用旧缓存
          key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('custom_config/.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-
      # ===================================================================

      # ================== 核心修正：智能清道夫顺序 ==================
      - name: Update feeds.conf
        run: |
          cd openwrt
          # 将额外的第三方插件包源（如 kenzok8/small）追加到 feeds 列表中
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default

      - name: Update feeds
        run: |
          cd openwrt
          # 更新所有软件源的包列表
          ./scripts/feeds update -a

      - name: Run diy.sh
        run: |
          chmod +x custom_config/diy.sh
          cd openwrt
          # 执行自定义脚本（通常用于修改默认后台 IP、修改主题名或移除不需要的默认插件）
          /bin/bash ../custom_config/diy.sh

      - name: Install feeds
        run: |
          cd openwrt
          # 将更新后的包安装到本地编译环境中，准备被 Make 读取
          ./scripts/feeds install -a
      # ==============================================================

      - name: Load Custom Configuration
        run: |
          cd openwrt
          # 引入自定义的 .config 配置文件和自定义文件目录（files，用于预置配置文件到固件中）
          [ -e ../custom_config/.config ] && mv ../custom_config/.config .config
          [ -d ../custom_config/files ] && mv ../custom_config/files files
          [ -d files ] && chmod -R 755 files || true
          
          # 【强力补丁】清除临时缓存，重新生成一份干净的依赖菜单，防止依赖串位导致编译失败
          rm -rf tmp/
          make defconfig

      # ================== 优化三：网络防爆破机制（完美闭环） ==================
      - name: Download package
        run: |
          cd openwrt
          echo "开始第一轮全量下载依赖包..."
          make download -j8
          echo "检查并揪出下载不完整的坏包（小于1KB通常是死链或下载截断导致的假文件）..."
          find dl -size -1024c -exec ls -l {} \;
          echo "无情删除这些坏包..."
          find dl -size -1024c -exec rm -f {} \;
          echo "开始第二轮补漏下载，确保刚才被干掉的坏包能重新完整下载回来..."
          make download -j8
      # ==============================================================

      - name: Compile the firmware
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          # 先尝试满血多线程编译。如果遇到错误崩了，自动回退到单线程（-j1 V=s）以输出详尽的报错日志供排查
          make -j$(nproc) || make -j1 V=s

      - name: Organize files
        id: organize
        run: |
          # 整理编译好的固件存放路径，删除无用的 packages 文件夹（不上传零碎的ipk文件），只保留固件本身
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        with:
          # 上传打包好的固件，命名带上最开始生成的时间戳
          name: OpenWrt_x86_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          retention-days: 7
