name: Build OpenWrt (Clean Architecture)

on:
  workflow_dispatch: # 仅支持手动触发，防止不必要的资源浪费

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Custom Configs
        uses: actions/checkout@v4
        with:
          path: custom_config # 将你的个人配置拉取到一个单独的文件夹

      - name: Init build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"

      - name: Clone OpenWrt Source
        run: |
          # 实时拉取 L 大最新鲜的源码
          git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

      - name: Update feeds.conf (注入第三方源)
        run: |
          cd openwrt
          echo "src-git small https://github.com/kenzok8/small" >> feeds.conf.default

      - name: Run diy.sh (注入自定义插件)
        run: |
          chmod +x custom_config/diy.sh
          cd openwrt
          /bin/bash ../custom_config/diy.sh

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load Custom Configuration (合并配置与Files)
        run: |
          cd openwrt
          # 将你的 .config 覆盖进去
          [ -e ../custom_config/.config ] && mv ../custom_config/.config .config
          # 将你的开机脚本合并进源码
          [ -d ../custom_config/files ] && mv ../custom_config/files files
          # 执行 make defconfig 补全依赖
          make defconfig

      - name: Download package
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile the firmware
        run: |
          cd openwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 V=s

      - name: Organize files (整理输出结果)
        id: organize
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV

      - name: Upload firmware directory
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_Firmware
          path: ${{ env.FIRMWARE }}
          retention-days: 7
